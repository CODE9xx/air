# =============================================================================
# Code9 Analytics — dev docker-compose
# Сервисы: postgres, redis, api (FastAPI), worker (RQ), web (Next.js 14)
# Все долгие операции — через worker. Hot-reload через bind-mount.
# =============================================================================

name: code9

services:
  postgres:
    image: postgres:18-alpine
    container_name: code9-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-code9}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-code9}
      POSTGRES_DB: ${POSTGRES_DB:-code9}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-code9} -d ${POSTGRES_DB:-code9}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: code9-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    container_name: code9-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      # Важно: PYTHONPATH должен включать /packages/ai/src и
      # /packages/crm-connectors/src — иначе импорты crm_connectors / ai
      # в dev не резолвятся (в prod compose это уже есть).
      PYTHONPATH: /app:/app/scripts:/packages/ai/src:/packages/crm-connectors/src
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./packages:/packages
      - ./scripts:/app/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
      target: dev
    container_name: code9-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      # См. аналогичный комментарий в сервисе api.
      PYTHONPATH: /app:/app/scripts:/packages/ai/src:/packages/crm-connectors/src
    volumes:
      - ./apps/worker:/app
      - ./packages:/packages
      - ./scripts:/app/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["python", "-m", "worker.main"]

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: dev
    container_name: code9-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    command: ["npm", "run", "dev"]

volumes:
  postgres-data:
  redis-data:
