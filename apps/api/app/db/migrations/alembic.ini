; =============================================================================
; CODE9 Analytics — общий alembic.ini.
;
; Используется обоими env'ами (main + tenant) через -c apps/api/app/db/migrations/alembic.ini
; и --name main | --name tenant. URL берётся из ENV в env.py (DATABASE_URL).
; =============================================================================

[alembic]
; Корень для env'ов — сам каталог с этим файлом.
script_location = %(here)s

; Где лежат конкретные версии — задаётся в каждом env-секции ниже.
version_locations =

; Синтаксис имён миграций: ISO-timestamp + slug.
; Реально мы именуем файлы вручную в стиле 0001_*, см. MIGRATION_STRATEGY.md.
file_template = %%(rev)s_%%(slug)s

; Выключаем автогенерацию нативных Postgres ENUM — храним текст+CHECK.
truncate_slug_length = 40

timezone = UTC

; Пустая — реальный URL берётся из ENV в env.py.
sqlalchemy.url =

; -----------------------------------------------------------------------------
; Секция main: управляет схемой public (core-таблицы).
; -----------------------------------------------------------------------------
[main]
script_location = %(here)s/main
version_locations = %(here)s/main/versions

; -----------------------------------------------------------------------------
; Секция tenant: применяет DDL шаблона внутрь указанной tenant-схемы.
; Вызывать:
;   alembic -c alembic.ini --name tenant -x schema=crm_amo_abc12345 upgrade head
; -----------------------------------------------------------------------------
[tenant]
script_location = %(here)s/tenant
version_locations = %(here)s/tenant/versions

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
