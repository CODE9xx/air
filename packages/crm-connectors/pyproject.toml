[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "code9-crm-connectors"
version = "0.1.0"
description = "CRM connectors (amoCRM / Kommo / Bitrix24 / Mock) for Code9 Analytics"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Code9 Analytics — CRM Integration" }]
license = { text = "Proprietary" }
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.6.0",
    "python-dateutil>=2.9.0",
]

[project.optional-dependencies]
dev = []

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
crm_connectors = ["fixtures/*.json"]
